# =============================================================================
# RAG-Advanced Docker Compose Configuration
# =============================================================================
# Prerequisites: Copy example.env to .env and set OPENAI_API_KEY (and optionally
# ANTHROPIC_API_KEY, EMBEDDING_BACKEND). The api service reads .env via env_file.
#
# Embedding backend: Default is OpenAI (1536-dim). Postgres is initialized with
# schema.sql (1536-dim). To use BGE-M3 (1024-dim), both must match:
#   1. Set EMBEDDING_BACKEND=bge-m3 in .env
#   2. Use 1024-dim schema at init. Options:
#      - Fresh stack with override: docker-compose -f docker-compose.yml -f docker-compose.bge-m3.yml up -d
#        (use a new volume or remove postgres_data first)
#      - Or after postgres is up, run from host: EMBEDDING_BACKEND=bge-m3 DATABASE_URL=... python scripts/run_schema.py
#        on an empty DB (e.g. new database or recreated volume).

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL with pgvector
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag-advanced-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rag_advanced
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Initialize with base schema
      - ./strategies/utils/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./evaluation/schema_extension.sql:/docker-entrypoint-initdb.d/02_evaluation.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rag_advanced"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis for caching and rate limiting
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: rag-advanced-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

  # ---------------------------------------------------------------------------
  # RAG-Advanced API
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-advanced-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/rag_advanced
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-your-key}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-sk-ant-your-key}
      # EMBEDDING_BACKEND: from env_file (.env). Do not override here so .env is used.
      # For BGE-M3 (1024-dim) set EMBEDDING_BACKEND=bge-m3 in .env; use docker-compose.bge-m3.yml for Postgres.
      API_DEBUG: "false"
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Development: pgAdmin (optional)
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: rag-advanced-pgadmin
    profiles:
      - dev
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:

networks:
  default:
    name: rag-advanced-network
