# =============================================================================
# RAG-Advanced Docker Compose Configuration
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL with pgvector
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag-advanced-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rag_advanced
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Initialize with base schema
      - ./strategies/utils/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./evaluation/schema_extension.sql:/docker-entrypoint-initdb.d/02_evaluation.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rag_advanced"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis for caching and rate limiting
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: rag-advanced-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

  # ---------------------------------------------------------------------------
  # RAG-Advanced API
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-advanced-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/rag_advanced
      REDIS_URL: redis://redis:6379/0
      # Override these in production with .env file
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-your-key}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-sk-ant-your-key}
      API_DEBUG: "false"
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Development: pgAdmin (optional)
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: rag-advanced-pgadmin
    profiles:
      - dev
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:

networks:
  default:
    name: rag-advanced-network
